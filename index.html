<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PM역량인증시험 지필점수 조회</title>
</head>
<body>
  <div class="page-header">
    <div class="logo-badge">🏆 PM역량인증시험</div>
    <h1>지필점수 조회 시스템</h1>
    <p class="subtitle">2026년 · 본인의 사번을 입력하여 점수를 확인하세요</p>
  </div>
  <div class="container">
    <p class="search-label">사번 입력</p>
    <div class="search-box">
      <input type="text" id="sabun-input" placeholder="예: 216099" maxlength="15" onkeydown="if(event.key==='Enter') search()"/>
      <button onclick="search()">조회하기</button>
    </div>
    <p class="notice">사번 입력 후 Enter 또는 조회하기 버튼을 누르세요</p>
    <div id="result"></div>
  </div>
  <script>
    // 예시 데이터
    const DATA = {
      "987654": [{ "이름": "홍길동", "지필점수": 82 }],
      "123456": [{ "이름": "이철수", "지필점수": 87 }]
    };
    function search() {
      const sabun = document.getElementById('sabun-input').value.trim();
      const resultDiv = document.getElementById('result');
      if (!sabun || !DATA[sabun]) {
        resultDiv.innerHTML = '<div>해당 사번의 정보를 찾을 수 없습니다.</div>';
        return;
      }
      const info = DATA[sabun][0];
      resultDiv.innerHTML = `<div>${info.이름}님의 점수: ${info.지필점수}</div>`;
    }
  </script>
</body>
</html>

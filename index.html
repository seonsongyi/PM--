                                  }

    .search-box button {

      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .search-box button:hover { opacity: 0.9; }
    .search-box button:active { transform: scale(0.97); }
    .notice {

      text-align: center;
      margin-bottom: 24px;
    }
    #result { display: none; margin-top: 20px; }

    .result-card {

    .score-badge {

    .badge-pass { background: #dcfce7; color: #15803d; border: 1.5px solid #bbf7d0; }
    .badge-fail { background: #fee2e2; color: #b91c1c; border: 1.5px solid #fecaca; }
    .badge-exempt { background: #dbeafe; color: #1d4ed8; border: 1.5px solid #bfdbfe; }
    .badge-pmp { background: #fef9c3; color: #854d0e; border: 1.5px solid #fde68a; }
    .result-banner {
      padding: 14px 20px;
      border-radius: 0 0 14px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.01em;
      line-height: 1.5;
    }
    .banner-pass {
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      color: #15803d;
      border-top: 1px solid #bbf7d0;
    }
    .banner-fail {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
      border-top: 1px solid #fde68a;
    }
    .banner-exempt {
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1e40af;
      border-top: 1px solid #bfdbfe;
    }
    .error-msg {
      text-align: center;
      padding: 24px;
      color: #b91c1c;
      background: #fff1f2;
      border-radius: 12px;
      font-size: 0.95rem;
      border: 1px solid #fecdd3;
    }
  </style>

    function getBadge(score, exempt) {
      if (score === 'PMP자격보유') return '<span class="score-badge badge-pmp">PMP보유</span>';
      if (exempt === '면제') return '<span class="score-badge badge-exempt">면제</span>';
      const n = parseInt(score);
      if (!isNaN(n)) {
        return n >= 60
          ? '<span class="score-badge badge-pass">합격</span>'
          : '<span class="score-badge badge-fail">불합격</span>';
      }
      return '';
    }

    function getBanner(score, exempt) {
      if (score === 'PMP자격보유' || exempt === '면제') {
        return '<div class="result-banner banner-exempt">✅ 면제 대상자입니다.</div>';
      }
      const n = parseInt(score);
      if (!isNaN(n)) {
        if (n >= 60) return '<div class="result-banner banner-pass">🎉 합격을 진심으로 축하드립니다!</div>';
        return '<div class="result-banner banner-fail">💪 아쉽지만 다음 기회가 있습니다. 충분히 해내실 수 있어요!</div>';
      }
      return '';
    }

    function renderCard(info, sabun) {
      const badge = getBadge(info['지필점수'], info['지필면제여부']);
      const banner = getBanner(info['지필점수'], info['지필면제여부']);
      const scoreVal = info['지필점수'] === '미입력' || info['지필점수'] === '-'
        ? '<span style="color:#aaa;font-size:1.1rem">미입력</span>'
        : `<span class="score-highlight">${info['지필점수']}</span>`;

      const emailHtml = info['이메일']
        ? `<a class="email-link" href="mailto:${info['이메일']}">${info['이메일']}</a>`
        : '<span style="color:#aaa">-</span>';

      return `
        <div class="result-card">
          <div class="result-header">
            <div class="name">${info['이름']}</div>
            <div class="position">${info['직위']}${info['직급'] && info['직급'] !== info['직위'] ? ' · ' + info['직급'] : ''}</div>
            <div class="exam-date">📅 ${info['시험일자']}</div>
          </div>
          <div class="result-body">
            <div class="info-grid">
              <div class="info-row full-width">
                <span class="info-label">이메일</span><span class="info-value">${emailHtml}</span>
              </div>
              <div class="info-row">
                <span class="info-label">본부</span><span class="info-value">${info['본부']}</span>
              </div>
              <div class="info-row">
                <span class="info-label">사업부</span><span class="info-value">${info['사업부'] || '-'}</span>
              </div>
              <div class="info-row full-width">
                <span class="info-label">조직</span><span class="info-value">${info['조직']}</span>
              </div>
            </div>
            <div class="score-section">
              <div class="score-left">
                <div class="score-label">지필점수</div>
                ${scoreVal}
                <div class="score-date">📅 ${info['시험일자']}</div>
              </div>
              <div>${badge}</div>
            </div>
          </div>
          ${banner}
        </div>`;
    }

    function search() {
      const sabun = document.getElementById('sabun-input').value.trim();
      const resultDiv = document.getElementById('result');

      if (!sabun) {
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<div class="error-msg">사번을 입력해주세요.</div>';
        return;
      }

      const entries = DATA[sabun];
      resultDiv.style.display = 'block';

      if (!entries || entries.length === 0) {
        resultDiv.innerHTML = '<div class="error-msg">해당 사번의 정보를 찾을 수 없습니다.<br>사번을 다시 확인해주세요.</div>';
        return;
      }

      let html = '';
      if (entries.length > 1) {
        html += `<div class="multi-label">총 ${entries.length}개 차수 응시 이력이 있습니다.</div>`;
      }
      entries.forEach(info => {
        html += renderCard(info, sabun);
      });
      resultDiv.innerHTML = html;
    }
  </script>
</body>
</html>
